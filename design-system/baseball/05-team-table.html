<!-- @dsCard group="Components" name="Team record + roster tables" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@baseball · Team tables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1f3c;--navy-2:#061222;--navy-soft:#0e2547;--gold:#e8b84b;--red:#c8472f;--cream:#f3efe4;
  --fg:#f3efe4;--fg-soft:rgba(243,239,228,.78);--fg-mute:rgba(243,239,228,.5);--fg-dim:rgba(243,239,228,.34);
  --line:rgba(243,239,228,.14);--surface:rgba(255,255,255,.03);--font:"Noto Sans TC","PingFang TC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--fg);
  background:linear-gradient(160deg,var(--navy-soft),var(--navy) 55%,var(--navy-2));min-height:100vh}
.wrap{max-width:880px;margin:0 auto;padding:40px 22px 80px}
.bt-h1{font-size:clamp(28px,4vw,40px);font-weight:900;line-height:1.1}
.bt-en{color:var(--fg-mute);font-size:15px;letter-spacing:1px;margin-top:2px}
.bt-sub{color:var(--fg-soft);font-size:15px;margin:12px 0 8px}
.bt-sub b{color:var(--gold)}
.asof{color:var(--fg-dim);font-size:12px;margin-bottom:24px}
.bt-sec{font-size:12px;letter-spacing:2px;color:var(--fg-mute);text-transform:uppercase;margin:30px 0 10px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:14.5px;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
th,td{padding:11px 10px;text-align:center;border-bottom:1px solid var(--line)}
thead th{color:var(--fg-mute);font-weight:700;font-size:12px;letter-spacing:.5px;background:rgba(255,255,255,.02)}
tbody tr:last-child td{border-bottom:none}
td.l,th.l{text-align:left}
.pts{color:var(--gold);font-weight:800}
.pos{color:var(--red);font-weight:700}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px 22px;margin-top:8px}
.roster .r{display:flex;gap:10px;align-items:baseline;padding:8px 4px;border-bottom:1px solid var(--line)}
.roster .num{font-family:ui-monospace,monospace;color:var(--gold);min-width:28px;font-size:13px}
.roster .nm{flex:1;font-size:14.5px}.roster .ps{color:var(--fg-mute);font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="bt-h1">洛杉磯道奇</h1>
  <div class="bt-en">Los Angeles Dodgers</div>
  <div class="bt-sub">國聯西區 · 2026 賽季例行賽 <b>52-29</b>（勝率 .642，分區第 1）</div>
  <div class="asof">截至 2026-06-26 · 賽季進行中</div>

  <div class="bt-sec">戰績</div>
  <table>
    <thead><tr><th>勝</th><th>敗</th><th>勝率</th><th>分區</th><th>排名</th><th>勝差</th><th>近況</th><th>得分</th><th>失分</th><th>淨</th></tr></thead>
    <tbody><tr><td class="pts">52</td><td>29</td><td>.642</td><td>國聯西區</td><td class="pos">1</td><td>—</td><td>W4</td><td>438</td><td>294</td><td>+144</td></tr></tbody>
  </table>

  <div class="bt-sec">主客場拆分</div>
  <table>
    <thead><tr><th class="l">場地</th><th>勝</th><th>敗</th></tr></thead>
    <tbody>
      <tr><td class="l">主場</td><td class="pts">28</td><td>14</td></tr>
      <tr><td class="l">客場</td><td class="pts">24</td><td>15</td></tr>
    </tbody>
  </table>

  <div class="bt-sec">球員名冊 · 26 人</div>
  <div class="roster">
    <div class="r"><span class="num">17</span><span class="nm">大谷翔平</span><span class="ps">投打二刀流</span></div>
    <div class="r"><span class="num">18</span><span class="nm">山本由伸</span><span class="ps">投手</span></div>
    <div class="r"><span class="num">5</span><span class="nm">Freddie Freeman</span><span class="ps">一壘手</span></div>
    <div class="r"><span class="num">50</span><span class="nm">Mookie Betts</span><span class="ps">游擊手</span></div>
  </div>
</div>
</body>
</html>
